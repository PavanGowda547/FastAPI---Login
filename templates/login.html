<!DOCTYPE html>
<html>
<body>
<h2>Login</h2>

<form method="post">
  Username: <input type="text" name="username"><br><br>
  Password: <input type="password" name="password"><br><br>
  <button type="submit">Login</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<a href="/signup">Don't have an account? Signup</a>
</body>
</html>
