<!DOCTYPE html>
<html>
<body>
<h2>Signup</h2>

<form method="post">
  Username: <input type="text" name="username"><br><br>
  Password: <input type="password" name="password"><br><br>
  <button type="submit">Signup</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<a href="/login">Already have an account? Login</a>
</body>
</html>
